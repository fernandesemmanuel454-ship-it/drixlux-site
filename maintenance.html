<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drix Lux — Maintenance</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e1a;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(16, 25, 60, 0.6) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(12, 20, 50, 0.5) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(201, 162, 39, 0.03) 0%, transparent 40%);
            font-family: 'Inter', sans-serif;
            color: #e8e8e8;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: #ffffff;
            margin-bottom: 0.3rem;
        }

        .logo span {
            color: #C9A227;
        }

        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #C9A227;
            margin-bottom: 3rem;
            opacity: 0.8;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #C9A227, transparent);
            margin: 0 auto 2.5rem;
        }

        .message {
            font-size: 1.3rem;
            font-weight: 300;
            line-height: 1.8;
            color: #c0c4d0;
            margin-bottom: 1rem;
        }

        .message strong {
            color: #ffffff;
            font-weight: 500;
        }

        .date {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.7rem 2rem;
            border: 1px solid rgba(201, 162, 39, 0.3);
            border-radius: 4px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: #C9A227;
            background: rgba(201, 162, 39, 0.05);
        }

        .footer {
            margin-top: 3.5rem;
            font-size: 0.8rem;
            color: #4a4e5a;
            letter-spacing: 0.05em;
        }

        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(201, 162, 39, 0.15);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            from { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            to { transform: translateY(-10vh); opacity: 0; }
        }

        .container { position: relative; z-index: 1; }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle" style="left:10%;animation-duration:12s;animation-delay:0s"></div>
        <div class="particle" style="left:25%;animation-duration:15s;animation-delay:2s"></div>
        <div class="particle" style="left:40%;animation-duration:10s;animation-delay:4s"></div>
        <div class="particle" style="left:55%;animation-duration:14s;animation-delay:1s"></div>
        <div class="particle" style="left:70%;animation-duration:11s;animation-delay:3s"></div>
        <div class="particle" style="left:85%;animation-duration:13s;animation-delay:5s"></div>
        <div class="particle" style="left:15%;animation-duration:16s;animation-delay:6s"></div>
        <div class="particle" style="left:60%;animation-duration:9s;animation-delay:7s"></div>
    </div>

    <div class="container">
        <div class="logo">DRIX <span>LUX</span></div>
        <div class="tagline">Livraison Alcool Premium</div>
        <div class="divider"></div>
        <p class="message">
            <strong>Site en cours d'amelioration</strong><br>
            Nous travaillons pour vous offrir une meilleure experience.
        </p>
        <div class="date">Retour en ligne lundi 6 avril 2026</div>
        <div class="footer">&copy; 2026 Drix Lux &mdash; Luxembourg</div>
    </div>
</body>
</html>
