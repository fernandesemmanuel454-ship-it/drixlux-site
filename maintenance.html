<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drix Lux — Maintenance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #080c10;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            color: #e0e0e0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: #ffffff;
            margin-bottom: 2.5rem;
        }

        .logo .dot {
            color: #3887ff;
        }

        .worker-scene {
            width: 220px;
            height: 220px;
            margin: 0 auto 2.5rem;
        }

        /* Hammer arm animation */
        .hammer-arm {
            transform-origin: 95px 115px;
            animation: hammerSwing 0.8s ease-in-out infinite;
        }

        @keyframes hammerSwing {
            0%, 100% { transform: rotate(0deg); }
            40% { transform: rotate(-45deg); }
            50% { transform: rotate(-45deg); }
            70% { transform: rotate(5deg); }
        }

        /* Sparks */
        .spark {
            opacity: 0;
            animation: sparkFlash 0.8s ease-out infinite;
        }
        .spark1 { animation-delay: 0.68s; }
        .spark2 { animation-delay: 0.72s; }
        .spark3 { animation-delay: 0.7s; }

        @keyframes sparkFlash {
            0%, 85% { opacity: 0; }
            88% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Body bob */
        .worker-body {
            animation: bodyBob 0.8s ease-in-out infinite;
        }

        @keyframes bodyBob {
            0%, 100% { transform: translateY(0); }
            40% { transform: translateY(-2px); }
            70% { transform: translateY(1px); }
        }

        .message {
            font-size: 1.15rem;
            font-weight: 300;
            line-height: 1.7;
            color: #b0b8c4;
            opacity: 0;
            animation: fadeUp 1.2s ease-out 0.5s forwards;
        }

        .date {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.6rem 1.8rem;
            border: 1px solid rgba(56, 135, 255, 0.3);
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #3887ff;
            background: rgba(56, 135, 255, 0.06);
            opacity: 0;
            animation: fadeUp 1.2s ease-out 1s forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #3a3f4a;
            opacity: 0;
            animation: fadeUp 1s ease-out 1.4s forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">DRIX<span class="dot">.</span>LUX</div>

        <div class="worker-scene">
            <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
                <!-- Ground line -->
                <line x1="30" y1="195" x2="190" y2="195" stroke="#1a2030" stroke-width="2" stroke-linecap="round"/>

                <!-- Anvil / work surface -->
                <rect x="120" y="175" width="50" height="20" rx="3" fill="#1e2a3a"/>
                <rect x="115" y="170" width="60" height="8" rx="2" fill="#263545"/>

                <g class="worker-body">
                    <!-- Legs -->
                    <line x1="88" y1="165" x2="80" y2="193" stroke="#4a7ab5" stroke-width="5" stroke-linecap="round"/>
                    <line x1="97" y1="165" x2="105" y2="193" stroke="#4a7ab5" stroke-width="5" stroke-linecap="round"/>

                    <!-- Boots -->
                    <ellipse cx="78" cy="194" rx="8" ry="4" fill="#2a3a4a"/>
                    <ellipse cx="107" cy="194" rx="8" ry="4" fill="#2a3a4a"/>

                    <!-- Body (torso) -->
                    <rect x="78" y="120" width="28" height="48" rx="8" fill="#3a6090"/>

                    <!-- Belt -->
                    <rect x="78" y="155" width="28" height="5" rx="1" fill="#2a4060"/>

                    <!-- Left arm (static, hanging) -->
                    <line x1="80" y1="128" x2="68" y2="155" stroke="#3a6090" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="67" cy="157" r="3.5" fill="#f0c8a0"/>

                    <!-- Head -->
                    <circle cx="92" cy="105" r="16" fill="#f0c8a0"/>

                    <!-- Eyes -->
                    <circle cx="87" cy="103" r="1.8" fill="#1a2030"/>
                    <circle cx="97" cy="103" r="1.8" fill="#1a2030"/>

                    <!-- Slight smile -->
                    <path d="M88 110 Q92 114 96 110" stroke="#c4956a" stroke-width="1.2" fill="none" stroke-linecap="round"/>

                    <!-- Hard hat -->
                    <ellipse cx="92" cy="93" rx="20" ry="6" fill="#e8a820"/>
                    <rect x="78" y="78" width="28" height="16" rx="6" fill="#f0b830"/>
                    <rect x="85" y="75" width="14" height="5" rx="2" fill="#f0b830"/>
                    <!-- Hat stripe -->
                    <rect x="78" y="88" width="28" height="3" rx="1" fill="#d09018"/>
                </g>

                <!-- Right arm with hammer (animated) -->
                <g class="hammer-arm">
                    <!-- Upper arm -->
                    <line x1="105" y1="128" x2="120" y2="110" stroke="#3a6090" stroke-width="5" stroke-linecap="round"/>
                    <!-- Forearm -->
                    <line x1="120" y1="110" x2="145" y2="100" stroke="#f0c8a0" stroke-width="4" stroke-linecap="round"/>
                    <!-- Hammer handle -->
                    <line x1="140" y1="98" x2="160" y2="82" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
                    <!-- Hammer head -->
                    <rect x="154" y="72" width="18" height="12" rx="2" fill="#7a8a9a" transform="rotate(-30 163 78)"/>
                    <rect x="154" y="74" width="18" height="3" rx="1" fill="#8a9aaa" transform="rotate(-30 163 78)"/>
                </g>

                <!-- Sparks (appear on impact) -->
                <circle class="spark spark1" cx="145" cy="168" r="2" fill="#ffcc33"/>
                <circle class="spark spark2" cx="150" cy="162" r="1.5" fill="#ffaa22"/>
                <circle class="spark spark3" cx="140" cy="163" r="1.5" fill="#ffdd55"/>
                <line class="spark spark1" x1="148" y1="165" x2="155" y2="158" stroke="#ffcc33" stroke-width="1.5" stroke-linecap="round"/>
                <line class="spark spark2" x1="142" y1="163" x2="135" y2="156" stroke="#ffaa22" stroke-width="1" stroke-linecap="round"/>
            </svg>
        </div>

        <p class="message">Site en travaux pour ameliorer votre experience</p>
        <div class="date">Retour en ligne — Lundi 6 avril 2026</div>
        <div class="footer">&copy; 2026 Drix Lux — Luxembourg</div>
    </div>
</body>
</html>
